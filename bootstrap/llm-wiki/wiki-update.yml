name: LLM Wiki Update

on:
  pull_request:
    types: [closed]

jobs:
  update-wiki:
    if: github.event.pull_request.merged == true && !contains(github.event.pull_request.title, '[skip-wiki]')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: read

    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install lint deps
        run: pip install pyyaml

      - name: Extract PR context
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          gh pr view "$PR_NUMBER" \
            --json number,title,body,mergeCommit,files,reviews,comments \
            > pr-context.json
          echo "PR_MERGE_SHA=$(jq -r '.mergeCommit.oid' pr-context.json)" >> "$GITHUB_ENV"
          echo "--- PR context ---"
          jq '{number, title, files: (.files | map(.path))}' pr-context.json

      - name: Configure git
        run: |
          git config user.name "llm-wiki-bot"
          git config user.email "llm-wiki-bot@users.noreply.github.com"

      - name: Run Claude Code wiki update
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            Você é o bibliotecário da LLM Wiki deste repositório.

            CONTEXTO:
            - PR #${{ github.event.pull_request.number }} acabou de ser merged em main.
            - O contexto completo do PR está em `pr-context.json` (título, body, arquivos, reviews, comentários).
            - O SHA do merge commit é: ${{ env.PR_MERGE_SHA }}

            LEIA AGORA:
            1. `AGENTS.md` (protocolo inviolável — siga à risca).
            2. `pr-context.json` para entender o quê mudou e por quê.
            3. Os arquivos listados em `.files[].path` de `pr-context.json`.
            4. As páginas existentes em `wiki/entidades/` dos módulos afetados.

            FAÇA:
            1. Atualize `wiki/entidades/<modulo>.md` para cada módulo tocado. Use ${{ env.PR_MERGE_SHA }} como `last_verified_commit`.
            2. Se a descrição do PR ou comentários mencionam decisão de design (tradeoff, alternativa considerada, "optei por X ao invés de Y"), crie ADR em `wiki/decisoes/<slug>.md`.
            3. Se o PR introduz/muda padrão transversal, atualize `wiki/conceitos/`.
            4. Rebaixe `confidence` para `medium` em páginas cujos `source_files` são dependências dos arquivos mudados (imports cruzados).
            5. Registre entrada em `wiki/log.md` com formato:
               `- YYYY-MM-DD HH:MM | PR #${{ github.event.pull_request.number }} | <páginas editadas> | <resumo>`
            6. Atualize `wiki/index.md` se criou/removeu páginas.

            NÃO FAÇA:
            - Não modifique nada fora de `wiki/`.
            - Não delete páginas obsoletas (use `superseded_by`).
            - Não invente `source_files`.
            - Não escreva prosa genérica.

            VALIDE antes de terminar: rode `python wiki-lint.py`. Se falhar, corrija e rode de novo.

      - name: Lint wiki
        run: python wiki-lint.py --fix

      - name: Commit & push wiki update
        run: |
          if git diff --quiet wiki/; then
            echo "Nenhuma mudança em wiki/ — nada a commitar."
            exit 0
          fi
          git add wiki/
          git commit -m "wiki: sync from PR #${{ github.event.pull_request.number }} [skip-wiki]

          Auto-generated by LLM Wiki Update workflow.
          Source PR: ${{ github.event.pull_request.html_url }}
          Merge commit: ${{ env.PR_MERGE_SHA }}"
          git push origin main

      - name: Cleanup
        if: always()
        run: rm -f pr-context.json
